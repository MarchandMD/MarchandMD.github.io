<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pomodoro</h1>
        <h2 id="digits"></h2>
        <div class="buttons">
            <button id="startBtn">
                Start
            </button>
            <button id="stopBtn">
                Stop
            </button>
            <button id="increaseBtn">add a minute</button>
            <button id="decreaseBtn">subtract a minute</button>
            <button id="resetBtn">Reset</button>
        </div>
        <h2 id="breakTimer">0</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
